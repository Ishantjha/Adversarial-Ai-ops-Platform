version: '3.8'

services:
  aiops-api:
    build: .
    container_name: aiops-platform
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - APP_NAME=AIOps-Platform
      - APP_VERSION=1.0.0
      - DEBUG=False
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped